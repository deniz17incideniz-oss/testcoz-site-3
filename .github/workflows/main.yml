name: Automated Test Generation

on:
  repository_dispatch:
    types: [generate_test]

permissions:
  contents: write

jobs:
  generate-test:
    runs-on: ubuntu-latest

    steps:
      - name: Repo checkout
        uses: actions/checkout@v4

      - name: Test dosyası oluştur
        run: |
          mkdir -p tests

          FILE_NAME="${{ github.event.client_payload.ders }}-${{ github.event.client_payload.konu }}-test-${{ github.event.client_payload.testNo }}.html"

          cat > tests/$FILE_NAME <<EOF
          <!DOCTYPE html>
          <html lang="tr">
          <head>
            <meta charset="UTF-8">
            <title>TestÇöz</title>
          </head>
          <body style="font-family:Arial;padding:40px">
            <h1>🚀 Otomasyon Çalıştı</h1>

            <p>Sınıf: ${{ github.event.client_payload.sinif }}</p>
            <p>Ders: ${{ github.event.client_payload.ders }}</p>
            <p>Konu: ${{ github.event.client_payload.konu }}</p>
            <p>Test No: ${{ github.event.client_payload.testNo }}</p>
            <p>Zorluk: ${{ github.event.client_payload.zorluk }}</p>
          </body>
          </html>
          EOF

      - name: Commit ve push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add .

          git commit -m "Yeni otomatik test"

          git push

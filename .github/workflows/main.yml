name: Automated Test Generation

on:
  repository_dispatch:
    types: [generate_test]

permissions:
  contents: write

jobs:
  generate-test:
    runs-on: ubuntu-latest

    steps:
      - name: Repo checkout
        uses: actions/checkout@v4

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Paketleri yükle
        run: npm install

      - name: Gerçek test generator çalıştır
        run: |
          node automation/generate-test.js \
          "${{ github.event.client_payload.sinif }}" \
          "${{ github.event.client_payload.ders }}" \
          "${{ github.event.client_payload.konu }}" \
          "${{ github.event.client_payload.testNo }}" \
          "${{ github.event.client_payload.zorluk }}"

      - name: Git ayarla
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

      - name: Commit oluştur
        run: |
          git add .
          git commit -m "Yeni otomatik test" || echo "Değişiklik yok"

      - name: Push yap
        run: git push

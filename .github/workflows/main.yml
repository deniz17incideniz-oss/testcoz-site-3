name: Generate Test HTML

on:
repository_dispatch:
types:
- new-test-uploaded

workflow_dispatch:
inputs:
file_id:
required: true
type: string

```
  file_name:
    required: true
    type: string
```

permissions:
contents: write

jobs:
generate:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout repo
    uses: actions/checkout@v4
    with:
      fetch-depth: 0

  - name: Setup Node
    uses: actions/setup-node@v4
    with:
      node-version: 20

  - name: Install dependencies
    run: |
      cd automation
      npm install

  - name: Get file info
    id: fileinfo
    run: |
      FILE_ID="${{ github.event.client_payload.file_id || github.event.inputs.file_id }}"
      FILE_NAME="${{ github.event.client_payload.file_name || github.event.inputs.file_name }}"

      echo "file_id=$FILE_ID" >> $GITHUB_OUTPUT
      echo "file_name=$FILE_NAME" >> $GITHUB_OUTPUT

      SLUG="${FILE_NAME%.docx}"
      echo "slug=$SLUG" >> $GITHUB_OUTPUT

  - name: Download DOCX
    run: |
      FILE_ID="${{ steps.fileinfo.outputs.file_id }}"
      FILE_NAME="${{ steps.fileinfo.outputs.file_name }}"

      mkdir -p /tmp/testcoz

      curl -L \
        "https://drive.google.com/uc?export=download&id=${FILE_ID}" \
        -o "/tmp/testcoz/${FILE_NAME}"

      echo "=== FILE TYPE ==="
      file "/tmp/testcoz/${FILE_NAME}"

      echo "=== FILE SIZE ==="
      ls -lh "/tmp/testcoz/${FILE_NAME}"

      unzip -t "/tmp/testcoz/${FILE_NAME}"

  - name: Generate HTML
    run: |
      FILE_NAME="${{ steps.fileinfo.outputs.file_name }}"
      SLUG="${{ steps.fileinfo.outputs.slug }}"

      mkdir -p tests

      node automation/generate-test.js \
        "/tmp/testcoz/${FILE_NAME}" \
        "tests/${SLUG}.html"

  - name: Git config
    run: |
      git config user.name "testcoz-bot"
      git config user.email "bot@testcoz.pro"

  - name: Commit
    run: |
      git add .

      git commit -m "Yeni test: ${{ steps.fileinfo.outputs.slug }}" || echo "No changes"

  - name: Push
    run: |
      git pull --rebase origin main
      git push

  - name: Done
    run: |
      echo "Workflow tamamlandı"
```

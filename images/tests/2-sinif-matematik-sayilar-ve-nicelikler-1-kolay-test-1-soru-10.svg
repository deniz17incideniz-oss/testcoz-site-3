<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" role="img" aria-labelledby="title desc"><title id="title">Ardışık duraklar</title><desc id="desc">Görselde 46, 47 ve 48 numaralı duraklar sıralıdır. Ortadaki durak numarası ile son durak numarasının farkı kaçtır?</desc><style>.title{font:700 24px Arial,sans-serif;fill:#1E3A8A}.label{font:600 15px Arial,sans-serif;fill:#334155}.small{font:500 14px Arial,sans-serif;fill:#475569}.value{font:700 17px Arial,sans-serif;fill:#1E293B}.coin{font:700 18px Arial,sans-serif;fill:#92400E}.equation{font:700 36px Arial,sans-serif;fill:#1E3A8A}</style><rect width="720" height="300" rx="24" fill="#F8FAFC"/><rect x="18" y="18" width="684" height="264" rx="20" fill="#fff" stroke="#DBEAFE" stroke-width="3"/><text x="360" y="65" text-anchor="middle" class="title">Ardışık duraklar</text><line x1="75" y1="175" x2="645" y2="175" stroke="#334155" stroke-width="4"/><line x1="75" y1="165" x2="75" y2="185" stroke="#334155" stroke-width="2"/><text x="75" y="210" text-anchor="middle" class="small">45</text><line x1="217.5" y1="165" x2="217.5" y2="185" stroke="#334155" stroke-width="2"/><text x="217.5" y="210" text-anchor="middle" class="small">46</text><line x1="360" y1="165" x2="360" y2="185" stroke="#334155" stroke-width="2"/><text x="360" y="210" text-anchor="middle" class="small">47</text><line x1="502.5" y1="165" x2="502.5" y2="185" stroke="#334155" stroke-width="2"/><text x="502.5" y="210" text-anchor="middle" class="small">48</text><line x1="645" y1="165" x2="645" y2="185" stroke="#334155" stroke-width="2"/><text x="645" y="210" text-anchor="middle" class="small">49</text><circle cx="217.5" cy="150" r="10" fill="#2563EB"/><circle cx="360" cy="150" r="10" fill="#F59E0B"/><circle cx="502.5" cy="150" r="10" fill="#10B981"/></svg>
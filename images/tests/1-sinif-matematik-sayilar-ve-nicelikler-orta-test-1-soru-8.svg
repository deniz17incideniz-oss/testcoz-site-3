<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" role="img" aria-labelledby="title desc"><title id="title">Artan örüntü</title><desc id="desc">Görseldeki örüntüde her adımda nokta sayısı bir artıyor. Soru işaretinin yerine kaç nokta gelmelidir?</desc><style>.title{font:700 24px Arial,sans-serif;fill:#1E3A8A}.label{font:600 15px Arial,sans-serif;fill:#334155}.small{font:500 14px Arial,sans-serif;fill:#475569}.value{font:700 17px Arial,sans-serif;fill:#1E293B}.coin{font:700 18px Arial,sans-serif;fill:#92400E}.equation{font:700 36px Arial,sans-serif;fill:#1E3A8A}</style><rect width="720" height="300" rx="24" fill="#F8FAFC"/><rect x="18" y="18" width="684" height="264" rx="20" fill="#fff" stroke="#DBEAFE" stroke-width="3"/><text x="360" y="65" text-anchor="middle" class="title">Artan örüntü</text><circle cx="70" cy="120" r="8" fill="#2563EB"/><circle cx="94" cy="120" r="8" fill="#2563EB"/><text x="125" y="215" text-anchor="middle" class="label">1: 2</text><circle cx="215" cy="120" r="8" fill="#F59E0B"/><circle cx="239" cy="120" r="8" fill="#F59E0B"/><circle cx="263" cy="120" r="8" fill="#F59E0B"/><text x="270" y="215" text-anchor="middle" class="label">2: 3</text><circle cx="360" cy="120" r="8" fill="#10B981"/><circle cx="384" cy="120" r="8" fill="#10B981"/><circle cx="408" cy="120" r="8" fill="#10B981"/><circle cx="432" cy="120" r="8" fill="#10B981"/><text x="415" y="215" text-anchor="middle" class="label">3: 4</text><circle cx="505" cy="120" r="8" fill="#EF4444"/><circle cx="529" cy="120" r="8" fill="#EF4444"/><circle cx="553" cy="120" r="8" fill="#EF4444"/><circle cx="577" cy="120" r="8" fill="#EF4444"/><circle cx="601" cy="120" r="8" fill="#EF4444"/><text x="560" y="215" text-anchor="middle" class="label">?: 5</text></svg>
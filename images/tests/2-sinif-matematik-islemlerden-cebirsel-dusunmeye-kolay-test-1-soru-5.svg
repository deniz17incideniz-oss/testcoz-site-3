<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" role="img" aria-labelledby="title desc"><title id="title">Eşitliği tamamla</title><desc id="desc">Görselde 26 + 13 = 31 + ? eşitliği vardır. Soru işareti kaç olmalıdır?</desc><style>.title{font:700 24px Arial,sans-serif;fill:#1E3A8A}.label{font:600 15px Arial,sans-serif;fill:#334155}.small{font:500 14px Arial,sans-serif;fill:#475569}.value{font:700 17px Arial,sans-serif;fill:#1E293B}.coin{font:700 18px Arial,sans-serif;fill:#92400E}.equation{font:700 36px Arial,sans-serif;fill:#1E3A8A}</style><rect width="720" height="300" rx="24" fill="#F8FAFC"/><rect x="18" y="18" width="684" height="264" rx="20" fill="#fff" stroke="#DBEAFE" stroke-width="3"/><text x="360" y="65" text-anchor="middle" class="title">Eşitliği tamamla</text><rect x="105" y="105" width="510" height="105" rx="22" fill="#EFF6FF" stroke="#60A5FA" stroke-width="4"/><text x="360" y="173" text-anchor="middle" class="equation">26 + 13 = 31 + ?</text></svg>
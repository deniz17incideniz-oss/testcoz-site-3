<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" role="img" aria-labelledby="title desc"><title id="title">Özelliğine göre adlandır</title><desc id="desc">Görselde A şekli 4 eş kenarlı, B şekli 3 kenarlı, C şekli köşesizdir. A şeklinin adı nedir?</desc><style>.title{font:700 24px Arial,sans-serif;fill:#1E3A8A}.label{font:600 15px Arial,sans-serif;fill:#334155}.small{font:500 14px Arial,sans-serif;fill:#475569}.value{font:700 17px Arial,sans-serif;fill:#1E293B}.coin{font:700 18px Arial,sans-serif;fill:#92400E}.equation{font:700 36px Arial,sans-serif;fill:#1E3A8A}</style><rect width="720" height="300" rx="24" fill="#F8FAFC"/><rect x="18" y="18" width="684" height="264" rx="20" fill="#fff" stroke="#DBEAFE" stroke-width="3"/><text x="360" y="65" text-anchor="middle" class="title">Özelliğine göre adlandır</text><rect x="55" y="125" width="60" height="60" rx="8" fill="#2563EB" transform="rotate(0 85 155)"/><text x="85" y="225" text-anchor="middle" class="label">A</text><polygon points="360,125 330,185 390,185" fill="#F59E0B" transform="rotate(0 360 155)"/><text x="360" y="225" text-anchor="middle" class="label">B</text><circle cx="635" cy="155" r="30" fill="#10B981"/><text x="635" y="225" text-anchor="middle" class="label">C</text></svg>
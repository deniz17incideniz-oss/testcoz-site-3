<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" role="img" aria-labelledby="title desc"><title id="title">Okunan kitaplar</title><desc id="desc">Görselde A grubu 9, B grubu 6, C grubu 8 kitap okumuştur. Üç grup toplam kaç kitap okumuştur?</desc><style>.title{font:700 24px Arial,sans-serif;fill:#1E3A8A}.label{font:600 15px Arial,sans-serif;fill:#334155}.small{font:500 14px Arial,sans-serif;fill:#475569}.value{font:700 17px Arial,sans-serif;fill:#1E293B}.coin{font:700 18px Arial,sans-serif;fill:#92400E}.equation{font:700 36px Arial,sans-serif;fill:#1E3A8A}</style><rect width="720" height="300" rx="24" fill="#F8FAFC"/><rect x="18" y="18" width="684" height="264" rx="20" fill="#fff" stroke="#DBEAFE" stroke-width="3"/><text x="360" y="65" text-anchor="middle" class="title">Okunan kitaplar</text><rect x="70" y="110" width="90" height="125" rx="10" fill="#2563EB"/><text x="105" y="255" text-anchor="middle" class="label">A</text><text x="105" y="100" text-anchor="middle" class="value">9</text><rect x="256.66666666666663" y="151.66666666666669" width="90" height="83.33333333333333" rx="10" fill="#F59E0B"/><text x="291.66666666666663" y="255" text-anchor="middle" class="label">B</text><text x="291.66666666666663" y="141.66666666666669" text-anchor="middle" class="value">6</text><rect x="443.3333333333333" y="123.88888888888889" width="90" height="111.11111111111111" rx="10" fill="#10B981"/><text x="478.3333333333333" y="255" text-anchor="middle" class="label">C</text><text x="478.3333333333333" y="113.88888888888889" text-anchor="middle" class="value">8</text></svg>
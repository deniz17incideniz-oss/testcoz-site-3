<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" role="img" aria-labelledby="title desc"><title id="title">Her simge 2 kitap</title><desc id="desc">Görselde her simge 2 kitabı gösteriyor. Masal için 3, şiir için 2 simge vardır. İki türde toplam kaç kitap vardır?</desc><style>.title{font:700 24px Arial,sans-serif;fill:#1E3A8A}.label{font:600 15px Arial,sans-serif;fill:#334155}.small{font:500 14px Arial,sans-serif;fill:#475569}.value{font:700 17px Arial,sans-serif;fill:#1E293B}.coin{font:700 18px Arial,sans-serif;fill:#92400E}.equation{font:700 36px Arial,sans-serif;fill:#1E3A8A}</style><rect width="720" height="300" rx="24" fill="#F8FAFC"/><rect x="18" y="18" width="684" height="264" rx="20" fill="#fff" stroke="#DBEAFE" stroke-width="3"/><text x="360" y="65" text-anchor="middle" class="title">Her simge 2 kitap</text><text x="185" y="137" text-anchor="end" class="label">Masal</text><circle cx="235" cy="130" r="20" fill="#2563EB"/><circle cx="300" cy="130" r="20" fill="#2563EB"/><circle cx="365" cy="130" r="20" fill="#2563EB"/><text x="185" y="212" text-anchor="end" class="label">Şiir</text><circle cx="235" cy="205" r="20" fill="#F59E0B"/><circle cx="300" cy="205" r="20" fill="#F59E0B"/><text x="360" y="275" text-anchor="middle" class="small">Her simge 2 veriyi gösterir.</text></svg>
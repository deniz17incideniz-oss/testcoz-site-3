ke-width="2"/><text x="573.75" y="210" text-anchor="middle" class="small">27</text><line x1="645" y1="165" x2="645" y2="185" stroke="#334155" stroke-width="2"/><text x="645" y="210" text-anchor="middle" class="small">28</text><circle cx="75" cy="150" r="10" fill="#2563EB"/><circle cx="217.5" cy="150" r="10" fill="#F59E0B"/><circle cx="360" cy="150" r="10" fill="#10B981"/><circle cx="502.5" cy="150" r="10" fill="#EF4444"/></svg>
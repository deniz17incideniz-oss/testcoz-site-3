<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" role="img" aria-labelledby="title desc"><title id="title">Sevilen meyveler</title><desc id="desc">Görseldeki nesne grafiğinde elma 5, muz 3 kez seçilmiştir. Daha çok seçilen meyve hangisidir?</desc><style>.title{font:700 24px Arial,sans-serif;fill:#1E3A8A}.label{font:600 15px Arial,sans-serif;fill:#334155}.small{font:500 14px Arial,sans-serif;fill:#475569}.value{font:700 17px Arial,sans-serif;fill:#1E293B}.coin{font:700 18px Arial,sans-serif;fill:#92400E}.equation{font:700 36px Arial,sans-serif;fill:#1E3A8A}</style><rect width="720" height="300" rx="24" fill="#F8FAFC"/><rect x="18" y="18" width="684" height="264" rx="20" fill="#fff" stroke="#DBEAFE" stroke-width="3"/><text x="360" y="65" text-anchor="middle" class="title">Sevilen meyveler</text><rect x="70" y="110" width="90" height="125" rx="10" fill="#2563EB"/><text x="105" y="255" text-anchor="middle" class="label">Elma</text><text x="105" y="100" text-anchor="middle" class="value">5</text><rect x="350" y="160" width="90" height="75" rx="10" fill="#F59E0B"/><text x="385" y="255" text-anchor="middle" class="label">Muz</text><text x="385" y="150" text-anchor="middle" class="value">3</text></svg>
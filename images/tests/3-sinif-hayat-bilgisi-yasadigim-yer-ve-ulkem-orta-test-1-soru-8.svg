<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" role="img" aria-labelledby="title desc"><title id="title">Seçimini düzelt</title><desc id="desc">3. sınıf orta: Yaşadığım Yer ve Ülkem görselindeki yanlış davranışın yerine hangisi yapılmalıdır?</desc><style>.title{font:700 24px Arial,sans-serif;fill:#1E3A8A}.label{font:600 15px Arial,sans-serif;fill:#334155}.small{font:500 14px Arial,sans-serif;fill:#475569}.value{font:700 17px Arial,sans-serif;fill:#1E293B}.coin{font:700 18px Arial,sans-serif;fill:#92400E}.equation{font:700 36px Arial,sans-serif;fill:#1E3A8A}</style><rect width="720" height="300" rx="24" fill="#F8FAFC"/><rect x="18" y="18" width="684" height="264" rx="20" fill="#fff" stroke="#DBEAFE" stroke-width="3"/><text x="360" y="65" text-anchor="middle" class="title">Seçimini düzelt</text><rect x="80" y="105" width="170" height="58" rx="14" fill="#2563EB18" stroke="#2563EB" stroke-width="3"/><text x="165" y="140" text-anchor="middle" class="label">wrong: tarihî bir eserin üzerine yazı yazmak</text><rect x="275" y="105" width="170" height="58" rx="14" fill="#F59E0B18" stroke="#F59E0B" stroke-width="3"/><text x="360" y="140" text-anchor="middle" class="label">better: bildiği doğru yönü tarif edip gerekirse bir görevliye yönlendirmek</text></svg>
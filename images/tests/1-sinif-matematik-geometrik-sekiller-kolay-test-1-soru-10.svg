<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" role="img" aria-labelledby="title desc"><title id="title">Köşe sayıları</title><desc id="desc">Görselde üçgen, kare, dikdörtgen ve çember var. Üç köşeli şekil hangisidir?</desc><style>.title{font:700 24px Arial,sans-serif;fill:#1E3A8A}.label{font:600 15px Arial,sans-serif;fill:#334155}.small{font:500 14px Arial,sans-serif;fill:#475569}.value{font:700 17px Arial,sans-serif;fill:#1E293B}.coin{font:700 18px Arial,sans-serif;fill:#92400E}.equation{font:700 36px Arial,sans-serif;fill:#1E3A8A}</style><rect width="720" height="300" rx="24" fill="#F8FAFC"/><rect x="18" y="18" width="684" height="264" rx="20" fill="#fff" stroke="#DBEAFE" stroke-width="3"/><text x="360" y="65" text-anchor="middle" class="title">Köşe sayıları</text><polygon points="85,125 55,185 115,185" fill="#2563EB" transform="rotate(0 85 155)"/><text x="85" y="225" text-anchor="middle" class="label">Üçgen</text><rect x="238.33333333333337" y="125" width="60" height="60" rx="8" fill="#F59E0B" transform="rotate(0 268.33333333333337 155)"/><text x="268.33333333333337" y="225" text-anchor="middle" class="label">Kare</text><rect x="412.6666666666667" y="131" width="78" height="48" rx="8" fill="#10B981" transform="rotate(0 451.6666666666667 155)"/><text x="451.6666666666667" y="225" text-anchor="middle" class="label">Dikdörtgen</text><circle cx="635" cy="155" r="30" fill="#EF4444"/><text x="635" y="225" text-anchor="middle" class="label">Çember</text></svg>
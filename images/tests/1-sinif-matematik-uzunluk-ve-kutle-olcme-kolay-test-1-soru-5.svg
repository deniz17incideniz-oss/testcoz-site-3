<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" role="img" aria-labelledby="title desc"><title id="title">Oyuncak terazisi</title><desc id="desc">Terazide oyuncak ayı tarafı aşağıda, top tarafı yukarıdadır. Buna göre hangisi daha ağırdır?</desc><style>.title{font:700 24px Arial,sans-serif;fill:#1E3A8A}.label{font:600 15px Arial,sans-serif;fill:#334155}.small{font:500 14px Arial,sans-serif;fill:#475569}.value{font:700 17px Arial,sans-serif;fill:#1E293B}.coin{font:700 18px Arial,sans-serif;fill:#92400E}.equation{font:700 36px Arial,sans-serif;fill:#1E3A8A}</style><rect width="720" height="300" rx="24" fill="#F8FAFC"/><rect x="18" y="18" width="684" height="264" rx="20" fill="#fff" stroke="#DBEAFE" stroke-width="3"/><text x="360" y="65" text-anchor="middle" class="title">Oyuncak terazisi</text><line x1="360" y1="115" x2="360" y2="235" stroke="#475569" stroke-width="8"/><line x1="170" y1="145" x2="550" y2="145" stroke="#475569" stroke-width="7"/><circle cx="170" cy="180" r="55" fill="#DBEAFE"/><circle cx="550" cy="180" r="55" fill="#FEF3C7"/><text x="170" y="176" text-anchor="middle" class="value">Ayı</text><text x="170" y="200" text-anchor="middle" class="small">8</text><text x="550" y="176" text-anchor="middle" class="value">Top</text><text x="550" y="200" text-anchor="middle" class="small">4</text></svg>
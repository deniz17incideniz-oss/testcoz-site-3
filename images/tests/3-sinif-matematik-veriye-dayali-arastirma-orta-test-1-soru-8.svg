<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" role="img" aria-labelledby="title desc"><title id="title">Simgeli grafik</title><desc id="desc">3. sınıf orta: Görselde her simge 1 oyu gösteriyor. A seçeneği için 9 simge varsa kaç oy vardır?</desc><style>.title{font:700 24px Arial,sans-serif;fill:#1E3A8A}.label{font:600 15px Arial,sans-serif;fill:#334155}.small{font:500 14px Arial,sans-serif;fill:#475569}.value{font:700 17px Arial,sans-serif;fill:#1E293B}.coin{font:700 18px Arial,sans-serif;fill:#92400E}.equation{font:700 36px Arial,sans-serif;fill:#1E3A8A}</style><rect width="720" height="300" rx="24" fill="#F8FAFC"/><rect x="18" y="18" width="684" height="264" rx="20" fill="#fff" stroke="#DBEAFE" stroke-width="3"/><text x="360" y="65" text-anchor="middle" class="title">Simgeli grafik</text><text x="185" y="137" text-anchor="end" class="label">A</text><circle cx="235" cy="130" r="20" fill="#2563EB"/><circle cx="300" cy="130" r="20" fill="#2563EB"/><circle cx="365" cy="130" r="20" fill="#2563EB"/><circle cx="430" cy="130" r="20" fill="#2563EB"/><circle cx="495" cy="130" r="20" fill="#2563EB"/><circle cx="560" cy="130" r="20" fill="#2563EB"/><circle cx="625" cy="130" r="20" fill="#2563EB"/><circle cx="690" cy="130" r="20" fill="#2563EB"/><circle cx="755" cy="130" r="20" fill="#2563EB"/><text x="360" y="275" text-anchor="middle" class="small">Her simge 1 veriyi gösterir.</text></svg>
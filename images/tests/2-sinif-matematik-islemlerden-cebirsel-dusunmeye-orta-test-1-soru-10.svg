<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" role="img" aria-labelledby="title desc"><title id="title">Boncuk kutuları</title><desc id="desc">Görselde birinci kutuda 47, ikinci kutuda 28 boncuk vardır. İki kutudan toplam 15 boncuk kullanılırsa kaç boncuk kalır?</desc><style>.title{font:700 24px Arial,sans-serif;fill:#1E3A8A}.label{font:600 15px Arial,sans-serif;fill:#334155}.small{font:500 14px Arial,sans-serif;fill:#475569}.value{font:700 17px Arial,sans-serif;fill:#1E293B}.coin{font:700 18px Arial,sans-serif;fill:#92400E}.equation{font:700 36px Arial,sans-serif;fill:#1E3A8A}</style><rect width="720" height="300" rx="24" fill="#F8FAFC"/><rect x="18" y="18" width="684" height="264" rx="20" fill="#fff" stroke="#DBEAFE" stroke-width="3"/><text x="360" y="65" text-anchor="middle" class="title">Boncuk kutuları</text><rect x="70" y="110" width="90" height="125" rx="10" fill="#2563EB"/><text x="105" y="255" text-anchor="middle" class="label">1. kutu</text><text x="105" y="100" text-anchor="middle" class="value">47</text><rect x="256.66666666666663" y="160.53191489361703" width="90" height="74.46808510638297" rx="10" fill="#F59E0B"/><text x="291.66666666666663" y="255" text-anchor="middle" class="label">2. kutu</text><text x="291.66666666666663" y="150.53191489361703" text-anchor="middle" class="value">28</text><rect x="443.3333333333333" y="195.1063829787234" width="90" height="39.8936170212766" rx="10" fill="#10B981"/><text x="478.3333333333333" y="255" text-anchor="middle" class="label">Kullanılan</text><text x="478.3333333333333" y="185.1063829787234" text-anchor="middle" class="value">15</text></svg>
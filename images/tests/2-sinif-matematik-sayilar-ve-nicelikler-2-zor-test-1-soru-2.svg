<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" role="img" aria-labelledby="title desc"><title id="title">Kumbara hesabı</title><desc id="desc">Görselde kumbarada 80 TL vardır. 36 TL harcanırsa kaç TL kalır?</desc><style>.title{font:700 24px Arial,sans-serif;fill:#1E3A8A}.label{font:600 15px Arial,sans-serif;fill:#334155}.small{font:500 14px Arial,sans-serif;fill:#475569}.value{font:700 17px Arial,sans-serif;fill:#1E293B}.coin{font:700 18px Arial,sans-serif;fill:#92400E}.equation{font:700 36px Arial,sans-serif;fill:#1E3A8A}</style><rect width="720" height="300" rx="24" fill="#F8FAFC"/><rect x="18" y="18" width="684" height="264" rx="20" fill="#fff" stroke="#DBEAFE" stroke-width="3"/><text x="360" y="65" text-anchor="middle" class="title">Kumbara hesabı</text><circle cx="100" cy="155" r="48" fill="#FEF3C7" stroke="#D97706" stroke-width="5"/><text x="100" y="162" text-anchor="middle" class="coin">80 TL</text><circle cx="620" cy="155" r="48" fill="#FEF3C7" stroke="#D97706" stroke-width="5"/><text x="620" y="162" text-anchor="middle" class="coin">36 TL</text></svg>
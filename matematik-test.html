<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>TestÇöz</title>

  <style>
    body {
      font-family: Arial;
      background: #f3f4f6;
      padding: 20px;
    }

    /* 2 sütun */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    /* soru kartı */
    .question {
      background: white;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
    }

    /* görseller küçült */
    .question img {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      margin: 10px 0;
    }

    /* şık buton */
    .option {
      display: block;
      width: 100%;
      margin: 6px 0;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #e5e7eb;
      cursor: pointer;
      text-align: left;
    }

    .option:hover {
      background: #c7d2fe;
    }

    .correct {
      background: #4ade80 !important;
    }

    .wrong {
      background: #f87171 !important;
    }

    button.finish {
      margin-top: 20px;
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h1>TestÇöz</h1>

  <div class="grid" id="test"></div>

  <button class="finish" onclick="finish()">Testi Bitir</button>

  <div id="result"></div>

  <script>

    /* BURAYA WORD'DEN GELEN İÇERİK */
    const raw = `BURAYA WORD HTML GELİCEK`;

    /* basit parse (geliştireceğiz sonra) */
    const questions = raw.split("<p>").filter(x => x.trim() !== "");

    const container = document.getElementById("test");

    questions.forEach((q, i) => {
      const div = document.createElement("div");
      div.className = "question";
      div.innerHTML = "<b>" + (i + 1) + ". Soru</b><br>" + q;

      // demo şıklar (geçici)
      ["A", "B", "C", "D"].forEach((s) => {
        const btn = document.createElement("button");
        btn.className = "option";
        btn.innerText = s + ") seçenek";
        btn.onclick = () => btn.classList.add("correct");
        div.appendChild(btn);
      });

      container.appendChild(div);
    });

    function finish() {
      document.getElementById("result").innerHTML = "Test tamamlandı";
    }

  </script>

</body>

</html>

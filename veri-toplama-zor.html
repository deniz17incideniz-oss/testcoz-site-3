<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Veri Toplama - Zor</title>

<style>
body {
  font-family: Arial;
  background:#0f172a;
  color:white;
  margin:0;
}

.container {
  max-width:1100px;
  margin:auto;
  padding:20px;
}

.question-box {
  background:#1e293b;
  padding:25px;
  border-radius:14px;
  margin-top:20px;
}

button {
  width:100%;
  margin:10px 0;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#38bdf8;
  font-size:16px;
  cursor:pointer;
}

.skip { background:#f59e0b; }

.result { text-align:center; margin-top:40px; }

.wrong-box {
  background:#7f1d1d;
  padding:15px;
  border-radius:10px;
  margin-top:15px;
}

.solution {
  background:#14532d;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
}

img {
  max-width:100%;
  margin-top:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>4. Sınıf Veri Toplama - Zor</h1>
<h3 id="progress"></h3>

<div id="quiz"></div>

<div id="result" style="display:none;">
  <h2>Test Bitti 🎉</h2>
  <h3 id="score"></h3>

  <button onclick="goHome()">Ana Sayfa</button>
  <button onclick="showWrongs()">Yanlışlarını Öğren</button>

  <div id="wrongList"></div>
</div>

</div>

<script>

const questions = [

{
q:"Kantin satış grafiğine göre aşağıdakilerden hangileri doğrudur?",
img:"/images/soru1.png",
options:["I ve III","II ve III","I ve II","Yalnız I"],
answer:0,
exp:"En yüksek ve en düşük fark 50, II yanlış, III doğru."
},

{
q:"Aylara göre kitap sayısı grafiği için doğru olan?",
img:"/images/soru2.png",
options:["I ve II","I ve III","I II III","Yalnız III"],
answer:0,
exp:"Toplam 590, Şubat > Mart."
},

{
q:"Ali'nin okuma grafiği için doğru olan?",
img:"/images/soru3.png",
options:["II ve III","I II III","Yalnız I","I ve II"],
answer:3,
exp:"Toplam 180, III yanlış."
},

{
q:"Elma üretimi grafiği için doğru olan?",
img:"/images/soru4.png",
options:["I ve III","Yalnız I","II ve III","I ve II"],
answer:3,
exp:"Azalma yok, 2 ve 3 eşit."
},

{
q:"Geri dönüşüm verilerine göre doğru olan?",
img:"/images/soru5.png",
options:["I ve II","Yalnız II","I ve III","I II III"],
answer:0,
exp:"Toplam 360, III yanlış."
},

{
q:"Meyve satış tablosuna göre fark?",
img:"/images/soru6.png",
options:["90","100","110","120"],
answer:2,
exp:"110 TL."
},

{
q:"Boy uzunluklarına göre doğru olan?",
img:"/images/soru7.png",
options:["Yalnız I","I ve II","II ve III","I ve III"],
answer:3,
exp:"Ayşe en uzun."
},

{
q:"Oyuncak satış tablosu için doğru?",
img:"/images/soru8.png",
options:["150","Yapboz","Araba>Top","100"],
answer:1,
exp:"En az yapboz."
},

{
q:"Birikim tablosuna göre?",
img:"/images/soru9.png",
options:["Azalır","80","65","kat"],
answer:1,
exp:"+15 artış."
},

{
q:"Sinema verisine göre?",
img:"/images/soru10.png",
options:["Azalır","Akşam fazla","80","Öğle"],
answer:1,
exp:"Akşam yoğun."
}

];

let i=0, correct=0, wrongs=[];

function load(){
let q=questions[i];

document.getElementById("progress").innerText=`Soru ${i+1}/10`;

let html=`
<div class="question-box">
<h3>${q.q}</h3>
<img src="${q.img}">
${q.options.map((o,index)=>`<button onclick="check(${index})">${o}</button>`).join("")}
<button class="skip" onclick="skip()">Soruyu Geç</button>
</div>
`;

document.getElementById("quiz").innerHTML=html;
}

function check(a){
if(a===questions[i].answer) correct++;
else wrongs.push(questions[i]);
i++;
next();
}

function skip(){
wrongs.push(questions[i]);
i++;
next();
}

function next(){
if(i<questions.length) load();
else finish();
}

function finish(){
document.getElementById("quiz").style.display="none";
document.getElementById("result").style.display="block";
document.getElementById("score").innerText=
`Doğru: ${correct} | Yanlış: ${questions.length-correct}`;
}

function goHome(){
window.location.href="/index.html";
}

function showWrongs(){
let html="";
wrongs.forEach(q=>{
html+=`
<div class="wrong-box">
<h3>${q.q}</h3>
<img src="${q.img}">
<div class="solution">${q.exp}</div>
</div>
`;
});
document.getElementById("wrongList").innerHTML=html;
}

load();

</script>

</body>
</html>

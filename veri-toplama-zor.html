<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Veri Toplama - Zor</title>

<style>
body {
  font-family: Arial;
  background:#0f172a;
  color:white;
  margin:0;
}

.container {
  max-width:1100px;
  margin:auto;
  padding:20px;
}

.question-box {
  background:#1e293b;
  padding:25px;
  border-radius:14px;
  margin-top:20px;
}

button {
  display:block;
  width:100%;
  margin:10px 0;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#38bdf8;
  font-size:16px;
  cursor:pointer;
}

button:hover {
  background:#0ea5e9;
}

.skip {
  background:#f59e0b;
}

.result {
  text-align:center;
  margin-top:40px;
}

.wrong-box {
  background:#7f1d1d;
  padding:15px;
  border-radius:10px;
  margin-top:15px;
}

.solution {
  background:#14532d;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
}

img {
  max-width:100%;
  margin-top:10px;
  border-radius:10px;
}
</style>

</head>

<body>

<div class="container">

<h1>Veri Toplama - Zor Test</h1>
<h3 id="progress"></h3>

<div id="quiz"></div>

<div id="result" class="result" style="display:none;">
  <h2>Test Bitti 🎉</h2>
  <h3 id="score"></h3>

  <button onclick="goHome()">Ana Sayfaya Dön</button>
  <button onclick="showWrongs()">Yanlışlarını Öğren</button>

  <div id="wrongList"></div>
</div>

</div>

<script>

const questions = [

{
q:"Kantin satış grafiğine göre en fazla satış hangi gün?",
img:"/images/soru1.png",
options:["Pazartesi","Çarşamba","Cuma","Salı"],
answer:2,
exp:"Grafikte en yüksek değer Cuma gününe ait."
},

{
q:"Toplam satış kaçtır?",
img:"/images/soru2.png",
options:["200","250","300","350"],
answer:1,
exp:"Tüm değerler toplanır → 250"
}

];

let i=0, correct=0;
let wrongs=[];

function load(){
let q=questions[i];

document.getElementById("progress").innerText=`Soru ${i+1}/${questions.length}`;

let html=`
<div class="question-box">
<h3>${q.q}</h3>
${q.img ? `<img src="${q.img}">` : ""}

${q.options.map((o,index)=>`
<button onclick="check(${index})">${o}</button>
`).join("")}

<button class="skip" onclick="skip()">Soruyu Geç</button>
</div>
`;

document.getElementById("quiz").innerHTML=html;
}

function check(ans){
let q=questions[i];

if(ans===q.answer){
correct++;
}else{
wrongs.push(q);
}

i++;
next();
}

function skip(){
wrongs.push(questions[i]);
i++;
next();
}

function next(){
if(i<questions.length){
load();
}else{
finish();
}
}

function finish(){
document.getElementById("quiz").style.display="none";
document.getElementById("result").style.display="block";

document.getElementById("score").innerText=
`Doğru: ${correct} | Yanlış: ${questions.length-correct}`;
}

function goHome(){
window.location.href="/index.html";
}

function showWrongs(){
let html="";

wrongs.forEach(q=>{
html+=`
<div class="wrong-box">
<h3>${q.q}</h3>
${q.img ? `<img src="${q.img}">` : ""}
<div class="solution">${q.exp}</div>
</div>
`;
});

document.getElementById("wrongList").innerHTML=html;
}

load();

</script>

</body>
</html>
